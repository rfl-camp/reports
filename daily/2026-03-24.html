<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#fff;font-family:'Helvetica Neue',Helvetica,Arial,'Noto Sans SC',sans-serif;color:#111;-webkit-font-smoothing:antialiased}

/* ── Masthead ── */
.af-masthead{text-align:center;padding:20px 0 0;border-bottom:1px solid #ddd}
.af-logo{font-size:48px;font-weight:700;letter-spacing:3px;color:#000;font-family:Georgia,'Times New Roman',serif;text-decoration:none;display:block;line-height:1}
.af-logo:hover{color:#e8730e}
.af-nav{display:flex;justify-content:center;gap:24px;padding:14px 0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;border-top:1px solid #eee;margin-top:16px}
.af-nav a{color:#555;text-decoration:none;transition:color .15s}
.af-nav a:hover{color:#000}
.af-nav a.active{color:#000;font-weight:700}

/* ── Prev/Next arrows ── */
.pn-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:200;display:flex;align-items:center;justify-content:center;width:48px;height:48px;background:rgba(0,0,0,0.06);color:#333;text-decoration:none;font-size:22px;font-family:Georgia,serif;transition:all .2s;border-radius:50%}
.pn-arrow:hover{background:rgba(0,0,0,0.12);color:#000}
.pn-arrow.pn-left{left:16px}
.pn-arrow.pn-right{right:16px}
.pn-arrow .pn-label{position:absolute;top:50%;white-space:nowrap;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;color:#999;opacity:0;transition:opacity .2s;transform:translateY(-50%)}
.pn-left .pn-label{left:56px}
.pn-right .pn-label{right:56px}
.pn-arrow:hover .pn-label{opacity:1}

/* ── Date bar tools ── */
.af-date-bar{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:10px 0;border-bottom:2px solid #000;position:relative;display:flex;align-items:center;justify-content:center;gap:20px}
.af-today{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:#e8730e;text-decoration:none;transition:color .15s;cursor:pointer}
.af-today:hover{color:#000}
.af-cal-btn{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:#999;cursor:pointer;transition:color .15s;user-select:none;position:relative}
.af-cal-btn:hover{color:#000}
.af-cal-btn svg{width:14px;height:14px;vertical-align:-2px;margin-right:3px;fill:currentColor}

/* ── Calendar dropdown ── */
.cal-overlay{display:none;position:fixed;inset:0;z-index:500}
.cal-overlay.open{display:block}
.cal-drop{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:8px;background:#fff;border:1px solid #ddd;box-shadow:0 8px 32px rgba(0,0,0,0.12);z-index:501;padding:16px;min-width:280px}
.cal-drop.open{display:block}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:13px;font-weight:700;font-family:Georgia,serif;letter-spacing:0.5px}
.cal-arrow-btn{background:none;border:none;cursor:pointer;font-size:16px;color:#999;padding:4px 8px;transition:color .15s}
.cal-arrow-btn:hover{color:#000}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dow{font-size:8px;color:#999;letter-spacing:1px;text-transform:uppercase;padding:4px 0;font-weight:700}
.cal-day{font-size:12px;padding:6px 2px;color:#ccc;cursor:default;border-radius:2px;transition:all .12s;font-variant-numeric:tabular-nums}
.cal-day.has-issue{color:#000;font-weight:600;cursor:pointer}
.cal-day.has-issue:hover{background:#f5f5f5}
.cal-day.current{background:#000;color:#fff;font-weight:700}
.cal-day.current:hover{background:#333}
.cal-day.today-mark{box-shadow:inset 0 -2px 0 #e8730e}

/* ── Hero split layout ── */
.af-hero{display:flex;gap:0;border-bottom:2px solid #000;max-width:1100px;margin:0 auto}
.af-hero-left{flex:1;min-width:0;border-right:1px solid #ddd;display:flex;flex-direction:column}
.af-hero-visual{flex:1;background:#000;display:flex;align-items:center;justify-content:center;padding:48px;min-height:340px;position:relative;overflow:hidden}
.af-hero-visual .cover-crab{font-size:80px}
.af-hero-visual .cover-date{font-size:36px;font-weight:700;color:#fff;margin-top:12px;font-family:Georgia,serif;letter-spacing:1px}
.af-hero-visual .cover-weekday{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.af-hero-visual .cover-hero{font-size:15px;color:rgba(255,255,255,0.6);margin-top:16px;font-family:'Noto Serif SC',Georgia,serif;line-height:1.6;max-width:340px;text-align:center}
.af-hero-right{flex:1;min-width:0;display:flex;flex-direction:column}

/* ── Hero article list (right side) ── */
.af-hero-item{padding:20px 24px;border-bottom:1px solid #eee;transition:background .15s}
.af-hero-item:last-child{border-bottom:none}
.af-hero-item:hover{background:#fafafa}
.af-hero-cat{font-size:9px;letter-spacing:2px;color:#e8730e;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.af-hero-title{font-size:17px;font-weight:700;color:#000;text-transform:uppercase;line-height:1.3;letter-spacing:0.3px;margin-bottom:4px}
.af-hero-excerpt{font-size:12.5px;color:#666;line-height:1.5;font-family:'Noto Serif SC',Georgia,serif}

/* ── Main content ── */
.af-main{max-width:1100px;margin:0 auto;padding:0}

/* ── Page / Section base ── */
.mag-page{background:#fff;border:none;box-shadow:none;overflow:visible;cursor:default;position:relative}
.mag-page-inner{padding:40px 32px;font-family:'Noto Serif SC',Georgia,serif;font-size:15.5px;line-height:1.95;color:#222;position:relative;height:auto;overflow:visible}
.mag-page + .mag-page{border-top:1px solid #ddd}

/* Full-bleed */
.mag-full-bleed{width:100vw;margin-left:calc(-50vw + 50%);position:relative}

/* Hide original cover/back-cover inside main flow (we rebuild them) */
.mag-cover{display:none !important}
.mag-back-cover{border-top:2px solid #000 !important}

/* ── OVERVIEW ── */
.overview-inner{display:flex;flex-direction:column;height:auto;overflow:visible}
.ov-label{font-size:9px;letter-spacing:3px;color:#e8730e;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.ov-title{font-size:24px;font-weight:700;color:#000;margin-bottom:20px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:-0.3px;line-height:1.2;text-transform:uppercase}
.ov-body{font-size:15.5px;line-height:2;color:#333}
.ov-body b,.ov-body strong{color:#000;font-weight:700}
.ov-body a{color:#000;text-decoration:none;border-bottom:1px solid #ccc;transition:all .15s}
.ov-body a:hover{border-color:#e8730e;color:#e8730e}
.ov-dropcap{float:left;font-size:64px;line-height:0.78;font-family:Georgia,serif;color:#000;margin:4px 12px 0 0;font-weight:400}

/* ── SECTION PAGES ── */
.mag-accent-bar{height:2px;background:#000;margin-bottom:16px}
.mag-section-label{font-size:9px;letter-spacing:3px;color:#e8730e;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.mag-title{font-size:22px;font-weight:700;color:#000;margin-bottom:24px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;line-height:1.25;padding-bottom:14px;border-bottom:1px solid #ddd;text-transform:uppercase;letter-spacing:0.2px}
.mag-section-content{overflow:visible}

/* Articles */
.mag-article{margin-bottom:24px;padding:0 0 20px;border-bottom:1px solid #eee}
.mag-article:last-child{border-bottom:none;margin-bottom:8px;padding-bottom:0}
.art-title{font-size:16px;font-weight:700;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#000;margin-bottom:6px;line-height:1.3;text-transform:uppercase;letter-spacing:0.2px}
.art-body{font-size:14.5px;line-height:1.85;color:#444}
.art-body p{margin-bottom:8px}
.art-body b,.art-body strong{color:#000}
.art-body code{background:#f5f5f5;padding:2px 6px;border-radius:2px;font-size:12.5px;font-family:'SF Mono','Fira Code',monospace;color:#333;border:1px solid #e5e5e5}
.art-body a{color:#000;text-decoration:none;border-bottom:1px solid #ccc;transition:all .15s}
.art-body a:hover{color:#e8730e;border-color:#e8730e}
.art-body ul,.art-body ol{padding-left:20px;margin:8px 0}
.art-body li{margin-bottom:3px;font-size:14px}
.art-links{margin-top:10px}
.art-link{display:inline-block;background:#000;color:#fff;padding:4px 12px;font-size:9px;text-decoration:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;margin-right:5px;margin-bottom:4px;transition:background .15s;letter-spacing:1px;text-transform:uppercase;font-weight:500}
.art-link:hover{background:#e8730e}

/* Tips box */
.mag-tips{margin-top:16px;padding:18px 22px;background:#f7f7f7;border:none;border-top:2px solid #000;font-size:13.5px;line-height:1.8}
.mag-tips div{background:transparent !important;border:none !important;padding:0 !important;border-radius:0 !important}
.mag-tips b,.mag-tips strong{color:#000;font-size:13.5px}
.mag-tips a{color:#000;font-size:12.5px;border-bottom:1px solid #ccc}
.mag-tips a:hover{color:#e8730e;border-color:#e8730e}
.mag-tips br{line-height:1.8}

.mag-page-fade{display:none}
.mag-page-num{display:none}

/* ── BACK COVER → Footer ── */
.mag-back-cover{background:#000 !important;cursor:default;position:relative;overflow:hidden;border:none !important;box-shadow:none}
.mag-back-cover::before{display:none}
.back-cover-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:48px 24px;height:auto}
.back-decoration{display:none}
.back-content{display:flex;flex-direction:column;align-items:center;text-align:center}
.back-logo{font-size:44px}
.back-title{font-size:12px;font-weight:700;color:#fff;letter-spacing:6px;margin-top:12px;text-transform:uppercase}
.back-subtitle{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:4px;text-transform:uppercase;margin-top:2px}
.back-date{font-size:12px;color:rgba(255,255,255,0.3);margin-top:12px;letter-spacing:2px}
.back-rule{width:40px;height:1px;background:rgba(255,255,255,0.2);margin:20px 0}
.back-sources{font-size:10px;letter-spacing:1px}
.back-sources a{color:rgba(255,255,255,0.5);text-decoration:none;transition:color .15s;text-transform:uppercase;font-size:10px;letter-spacing:1px}
.back-sources a:hover{color:#e8730e}
.back-nav{margin-top:24px;display:flex;gap:12px}
.back-nav a{color:#fff;text-decoration:none;font-size:10px;padding:6px 16px;border:1px solid rgba(255,255,255,0.2);transition:all .15s;letter-spacing:1px;text-transform:uppercase}
.back-nav a:hover{border-color:#e8730e;color:#e8730e}

/* Reveal */
@keyframes revealUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mag-page:not(.mag-cover):not(.mag-back-cover){opacity:0}
.mag-page.revealed{animation:revealUp 0.35s ease-out forwards}

@media(max-width:767px){
  .af-hero{flex-direction:column}
  .af-hero-left{border-right:none;border-bottom:1px solid #ddd}
  .af-hero-visual{min-height:240px;padding:32px}
  .af-logo{font-size:32px}
  .af-nav{gap:12px;font-size:10px;flex-wrap:wrap}
  .mag-page-inner{padding:28px 16px}
  .mag-title{font-size:18px}
  .art-title{font-size:14px}
  .art-body{font-size:13.5px}
}
</style>

<script>
document.addEventListener('DOMContentLoaded',function(){
  var sections=document.querySelectorAll('.mag-page');

  /* ── Build hero from cover data ── */
  var cover=document.querySelector('.mag-cover');
  if(cover){
    var vis=document.getElementById('heroVisual');
    var crab=cover.querySelector('.cover-crab');
    var date=cover.querySelector('.cover-date');
    var wd=cover.querySelector('.cover-weekday');
    var hero=cover.querySelector('.cover-hero');
    if(crab)vis.appendChild(crab.cloneNode(true));
    if(date)vis.appendChild(date.cloneNode(true));
    if(wd)vis.appendChild(wd.cloneNode(true));
    if(hero)vis.appendChild(hero.cloneNode(true));
    vis.style.display='flex';
    vis.style.flexDirection='column';
    vis.style.alignItems='center';
    vis.style.textAlign='center';
  }

  /* ── Build hero right: first few section titles ── */
  var heroR=document.getElementById('heroRight');
  var sectionPages=document.querySelectorAll('.mag-page:not(.mag-cover):not(.mag-back-cover)');
  var count=0;
  sectionPages.forEach(function(pg){
    if(count>=5)return;
    var label=pg.querySelector('.mag-section-label,.ov-label');
    var title=pg.querySelector('.mag-title,.ov-title');
    if(!title)return;
    var item=document.createElement('div');
    item.className='af-hero-item';
    var cat=label?label.textContent.trim():'';
    var ttl=title.textContent.trim();
    // Get first line of body
    var body=pg.querySelector('.art-body,.ov-body');
    var excerpt=body?body.textContent.trim().slice(0,80)+'…':'';
    item.innerHTML='<div class="af-hero-cat">'+cat+'</div><div class="af-hero-title">'+ttl+'</div><div class="af-hero-excerpt">'+excerpt+'</div>';
    // Click to scroll to section
    item.style.cursor='pointer';
    item.addEventListener('click',function(){pg.scrollIntoView({behavior:'smooth',block:'start'})});
    heroR.appendChild(item);
    count++;
  });

  /* ── Back cover full-bleed ── */
  var bc=document.querySelector('.mag-back-cover');
  if(bc)bc.classList.add('mag-full-bleed');

  /* ── Scroll reveal ── */
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){e.target.classList.add('revealed');observer.unobserve(e.target)}
    });
  },{threshold:0.06});
  sections.forEach(function(s){
    if(!s.classList.contains('mag-cover'))observer.observe(s);
  });

  /* ── Keyboard: left/right arrows for prev/next ── */
  var prevUrl='2026-03-23.html';
  var nextUrl='2026-03-25.html';
  document.addEventListener('keydown',function(e){
    if(calOpen){if(e.key==='Escape'){closeCal();e.stopPropagation()}return}
    if(e.key==='Escape'){window.location.href='index.html'}
    if(e.key==='ArrowLeft'&&prevUrl){window.location.href=prevUrl}
    if(e.key==='ArrowRight'&&nextUrl){window.location.href=nextUrl}
  });

  /* ── Calendar picker ── */
  var allSlugs=["2026-04-12", "2026-04-11", "2026-04-10", "2026-04-09", "2026-04-08", "2026-04-07", "2026-04-06", "2026-04-05", "2026-04-04", "2026-04-03", "2026-04-02", "2026-04-01", "2026-03-31", "2026-03-30", "2026-03-29", "2026-03-28", "2026-03-27", "2026-03-26", "2026-03-25", "2026-03-24", "2026-03-23", "2026-03-22", "2026-03-21", "2026-03-20", "2026-03-19"];
  var slugSet=new Set(allSlugs);
  var curDate='2026-03-24';
  var calOpen=false;
  var calMonth,calYear;
  // init to current page's month
  var dp=curDate.split('-');
  calYear=parseInt(dp[0]);calMonth=parseInt(dp[1])-1;

  var calBtn=document.getElementById('calBtn');
  var calDrop=document.getElementById('calDrop');
  var calOverlay=document.getElementById('calOverlay');

  function closeCal(){calOpen=false;calDrop.style.display='none';calOverlay.className='cal-overlay'}
  function openCal(){calOpen=true;renderCal();calDrop.style.display='block';calOverlay.className='cal-overlay open'}
  calBtn.addEventListener('click',function(e){e.stopPropagation();calOpen?closeCal():openCal()});
  calOverlay.addEventListener('click',closeCal);

  var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DOWS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  var today=new Date();var todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  function renderCal(){
    var first=new Date(calYear,calMonth,1);
    var startDow=first.getDay();
    var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    var h='<div class="cal-header">';
    h+='<button class="cal-arrow-btn" id="calPrev">&#8592;</button>';
    h+='<span class="cal-month">'+MONTHS[calMonth]+' '+calYear+'</span>';
    h+='<button class="cal-arrow-btn" id="calNext">&#8594;</button>';
    h+='</div><div class="cal-grid">';
    for(var d=0;d<7;d++)h+='<div class="cal-dow">'+DOWS[d]+'</div>';
    for(var b=0;b<startDow;b++)h+='<div class="cal-day"></div>';
    for(var day=1;day<=daysInMonth;day++){
      var ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      var cls='cal-day';
      var hasIssue=slugSet.has(ds);
      if(hasIssue)cls+=' has-issue';
      if(ds===curDate)cls+=' current';
      if(ds===todayStr)cls+=' today-mark';
      h+='<div class="'+cls+'" data-date="'+ds+'">'+day+'</div>';
    }
    h+='</div>';
    calDrop.innerHTML=h;
    document.getElementById('calPrev').addEventListener('click',function(e){e.stopPropagation();calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCal()});
    document.getElementById('calNext').addEventListener('click',function(e){e.stopPropagation();calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCal()});
    calDrop.querySelectorAll('.cal-day.has-issue').forEach(function(el){
      el.addEventListener('click',function(){window.location.href=el.dataset.date+'.html'});
    });
  }

  // Hide TODAY button if already on latest
  if(curDate==='2026-04-12'){document.getElementById('todayBtn').style.display='none'}
});
</script>
</body>
</html>
